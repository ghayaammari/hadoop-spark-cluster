networks:
  hadoop-net:
    driver: bridge

services:

  namenode:
    build: .
    container_name: namenode
    hostname: namenode
    networks:
      - hadoop-net
    ports:
      - "9870:9870"    # HDFS Web UI
      - "8088:8088"    # YARN Resource Manager UI
      - "18080:18080"  # Spark History Server
      - "9000:9000"    # HDFS IPC port
    command: ["/scripts/start-namenode.sh"]
    environment:
      - JAVA_HOME=/usr/lib/jvm/java-11-openjdk-amd64
    volumes:
      - namenode-data:/opt/hadoop/data/namenode

  datanode1:
    build: .
    container_name: datanode1
    hostname: datanode1
    networks:
      - hadoop-net
    depends_on:
      - namenode
    ports:
      - "9864:9864"    # DataNode Web UI
      - "8042:8042"    # Node Manager UI
    command: ["/scripts/start-datanode.sh"]
    environment:
      - JAVA_HOME=/usr/lib/jvm/java-11-openjdk-amd64
    volumes:
      - datanode1-data:/opt/hadoop/data/datanode

  datanode2:
    build: .
    container_name: datanode2
    hostname: datanode2
    networks:
      - hadoop-net
    depends_on:
      - namenode
    ports:
      - "9865:9864"    # DataNode Web UI (different host port)
      - "8043:8042"    # Node Manager UI (different host port)
    command: ["/scripts/start-datanode.sh"]
    environment:
      - JAVA_HOME=/usr/lib/jvm/java-11-openjdk-amd64
    volumes:
      - datanode2-data:/opt/hadoop/data/datanode
  datanode3:
    build: .
    container_name: datanode3
    hostname: datanode3
    networks:
      - hadoop-net
    depends_on:
      - namenode
    ports:
      - "9866:9864"
      - "8044:8042"
    command: ["/scripts/start-datanode.sh"]
    environment:
      - JAVA_HOME=/usr/lib/jvm/java-11-openjdk-amd64
    volumes:
      - datanode3-data:/opt/hadoop/data/datanode

volumes:
  namenode-data:
  datanode1-data:
  datanode2-data:
  datanode3-data: